<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Titantron 4000 by SOL</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;600;700&family=Bebas+Neue&display=swap"
    rel="stylesheet"
  />
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    :root {
      --bg:#050508; --surface:#08080f; --accent:#6af;
      --accent-dim:rgba(100,170,255,0.3);
      --text:#fff; --text-dim:rgba(255,255,255,0.38);
      --text-ghost:rgba(255,255,255,0.15);
      --border:rgba(255,255,255,0.06);
      --glow:rgba(0,150,255,0.28);
    }

    body { background:var(--bg); color:#fff; font-family:"Oswald",sans-serif; display:flex; flex-direction:column; height:100vh; overflow:hidden; }

    .stage-wrap { flex:1; margin:10px; position:relative; background:var(--surface); border:1px solid var(--border); overflow:hidden; }

    .stage-floor { position:absolute; bottom:0; left:0; right:0; height:42%; background:linear-gradient(0deg,#080810,transparent); }

    .gorilla-platform {
      position:absolute; left:50%; top:59%; transform:translateX(-50%);
      width:22%; height:5%; z-index:9;
      background:linear-gradient(180deg,#2a2a44,#161628);
      border:1px solid rgba(255,255,255,0.06);
      border-radius:4px;
      box-shadow:0 10px 25px rgba(0,0,0,0.5), inset 0 1px 0 rgba(120,170,255,0.1);
    }

    .gorilla { position:absolute; left:50%; top:55.2%; transform:translateX(-50%); width:8%; height:8%; background:#111; z-index:10; }

    .ramp { position:absolute; bottom:0; left:50%; transform:translateX(-50%); width:28%; height:38%; background:#111; clip-path:polygon(42% 0%,58% 0%,76% 100%,24% 100%); }

    .pyro-col { position:absolute; bottom:39%; width:4px; height:0; background:orange; }
    .pyro-ramp { position:absolute; width:3px; height:0; background:orange; }

    .screen { position:absolute; background:#000; }
  </style>
</head>
<body>

<div class="stage-wrap">
  <div class="stage-floor"></div>
  <div class="gorilla-platform"></div>
  <div class="gorilla"></div>
  <div class="ramp"></div>

  <div class="pyro-col" style="left:50%"></div>
  <div class="pyro-ramp" style="left:50%; top:65%"></div>
</div>

<script>
const scale = 1.25;
const yOffset = 6;
</script>

</body>
</html>
