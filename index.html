<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Titantron.xyz</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #050508;
    --surface: #08080f;
    --accent: #6af;
    --accent-dim: rgba(100,170,255,0.3);
    --text: #fff;
    --text-dim: rgba(255,255,255,0.35);
    --text-ghost: rgba(255,255,255,0.15);
    --border: rgba(255,255,255,0.06);
    --glow: rgba(0,150,255,0.3);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Oswald', sans-serif;
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  .header {
    padding: 10px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 4px;
    background: linear-gradient(90deg, #fff 0%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .header .subtitle {
    font-size: 11px;
    font-weight: 300;
    color: var(--text-dim);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* BUTTONS */
  .btn {
    font-family: 'Oswald', sans-serif;
    font-size: 12px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    border-radius: 3px;
    padding: 8px 16px;
    cursor: pointer;
    transition: all 0.2s;
    outline: none;
  }
  .btn-primary {
    background: linear-gradient(135deg, #1a3a6a, #0d1f3a);
    border: 1px solid var(--accent-dim);
    color: #8cf;
    padding: 10px 20px;
    font-size: 13px;
    letter-spacing: 2px;
    border-radius: 4px;
  }
  .btn-primary:hover {
    background: linear-gradient(135deg, #264d8a, #132a4a);
    border-color: rgba(100,170,255,0.6);
  }
  .btn-play {
    background: linear-gradient(135deg, #1a5a2a, #0d2f15);
    border: 1px solid rgba(80,255,120,0.3);
    color: #8f8;
    padding: 8px 20px;
    font-size: 13px;
    letter-spacing: 2px;
  }
  .btn-play:disabled {
    background: rgba(255,255,255,0.03);
    border-color: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.2);
    cursor: default;
  }
    background: rgba(255,80,80,0.15);
    border-color: rgba(255,80,80,0.4);
    color: #f88;
  }
  .btn-pyro {
    background: rgba(255,120,0,0.1);
    border: 1px solid rgba(255,150,50,0.3);
    color: #fa6;
  }
  .btn-toggle {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.3);
  }
  .btn-toggle.on {
    background: rgba(100,170,255,0.1);
    border-color: var(--accent-dim);
    color: #8cf;
  }
  .btn-toggle.on-fog {
    background: rgba(150,180,220,0.1);
    border-color: rgba(150,180,220,0.3);
    color: #acd;
  }
  .btn-preset {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.4);
  }
  .btn-preset.active {
    background: rgba(100,170,255,0.15);
    border-color: rgba(100,170,255,0.4);
    color: #8cf;
  }

  /* PRESETS */
  .presets {
    padding: 8px 20px;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    flex-shrink: 0;
    align-items: center;
  }
  .preset-divider {
    width: 1px;
    height: 20px;
    background: rgba(255,255,255,0.12);
    border-radius: 1px;
    flex-shrink: 0;
    margin: 0 2px;
  }

  /* STAGE */
  .stage-wrap {
    margin: 4px 20px;
    position: relative;
    flex: 1;
    min-height: 0;
    border-radius: 6px;
    overflow: hidden;
    border: 1px solid var(--border);
    background: var(--surface);
    transition: border 0.3s;
  }
  .stage-wrap.drag-over {
    border: 2px dashed rgba(100,170,255,0.5);
  }

  /* ARENA COLOR SYSTEM — driven by JS via --ah (hue), --as (sat%), --al (light%) */
  :root {
    --ah: 210; --as: 80%; --al: 60%;
  }

  .arena-bg {
    position: absolute;
    inset: 0;
    transition: all 0.8s ease;
  }
  .arena-bg.lights-on {
    background:
      radial-gradient(ellipse 100% 60% at 50% 100%, hsla(var(--ah),var(--as),12%,0.95) 0%, transparent 70%),
      radial-gradient(ellipse 70% 50% at 30% 0%,   hsla(var(--ah),var(--as),var(--al),0.12) 0%, transparent 55%),
      radial-gradient(ellipse 70% 50% at 70% 0%,   hsla(var(--ah),var(--as),var(--al),0.12) 0%, transparent 55%),
      radial-gradient(ellipse 40% 30% at 50% 10%,  hsla(var(--ah),var(--as),var(--al),0.08) 0%, transparent 60%),
      linear-gradient(180deg, hsl(var(--ah),30%,4%) 0%, hsl(var(--ah),25%,7%) 40%, hsl(var(--ah),20%,9%) 100%);
  }
  .arena-bg.lights-off {
    background:
      radial-gradient(ellipse 100% 60% at 50% 100%, rgba(5,5,10,0.98) 0%, transparent 70%),
      linear-gradient(180deg, #020203 0%, #040408 50%, #060608 100%);
  }
  .structure-lines {
    position: absolute;
    inset: 0;
    background:
      linear-gradient(90deg, transparent 9%, rgba(255,255,255,0.025) 9.5%, transparent 10%),
      linear-gradient(90deg, transparent 89.5%, rgba(255,255,255,0.025) 90%, transparent 90.5%),
      linear-gradient(0deg, transparent 64%, rgba(255,255,255,0.02) 64.5%, transparent 65%);
  }

  /* SPOTS */
  .spot {
    position: absolute;
    pointer-events: none;
    transition: opacity 0.8s;
  }
  .spot-left {
    left: 8%; top: -15%; width: 30%; height: 95%;
    background: radial-gradient(ellipse at top, hsla(var(--ah),var(--as),var(--al),0.18) 0%, transparent 65%);
    transform: rotate(-12deg);
  }
  .spot-right {
    right: 8%; top: -15%; width: 30%; height: 95%;
    background: radial-gradient(ellipse at top, hsla(var(--ah),var(--as),var(--al),0.18) 0%, transparent 65%);
    transform: rotate(12deg);
  }
  .spot-center {
    left: 35%; top: -5%; width: 30%; height: 80%;
    background: radial-gradient(ellipse at top, rgba(255,255,255,0.10) 0%, hsla(var(--ah),var(--as),var(--al),0.06) 40%, transparent 70%);
  }
  .spot-wash-l {
    position: absolute;
    left: -5%; top: -5%; width: 35%; height: 70%;
    background: radial-gradient(ellipse at top left, hsla(var(--ah),var(--as),var(--al),0.07) 0%, transparent 60%);
    pointer-events: none;
    transition: opacity 0.8s;
    z-index: 2;
  }
  .spot-wash-r {
    position: absolute;
    right: -5%; top: -5%; width: 35%; height: 70%;
    background: radial-gradient(ellipse at top right, hsla(var(--ah),var(--as),var(--al),0.07) 0%, transparent 60%);
    pointer-events: none;
    transition: opacity 0.8s;
    z-index: 2;
  }
  /* Floor bounce — light hitting the stage floor */
  .floor-bounce {
    position: absolute;
    bottom: 0; left: 10%; right: 10%; height: 20%;
    background: radial-gradient(ellipse at bottom, hsla(var(--ah),var(--as),var(--al),0.06) 0%, transparent 70%);
    z-index: 2;
    pointer-events: none;
    transition: opacity 0.8s;
  }

  /* FOG — multi-layer animated */
  @keyframes fog-drift-1 {
    0%   { transform: translateX(-4%) scaleX(1.04); opacity: 1; }
    50%  { transform: translateX(4%)  scaleX(0.97); opacity: 0.7; }
    100% { transform: translateX(-4%) scaleX(1.04); opacity: 1; }
  }
  @keyframes fog-drift-2 {
    0%   { transform: translateX(3%)  scaleX(0.98); opacity: 0.8; }
    50%  { transform: translateX(-5%) scaleX(1.05); opacity: 1; }
    100% { transform: translateX(3%)  scaleX(0.98); opacity: 0.8; }
  }
  @keyframes fog-drift-3 {
    0%   { transform: translateX(0%)  scaleX(1);    opacity: 0.6; }
    33%  { transform: translateX(-3%) scaleX(1.03); opacity: 0.9; }
    66%  { transform: translateX(4%)  scaleX(0.97); opacity: 0.5; }
    100% { transform: translateX(0%)  scaleX(1);    opacity: 0.6; }
  }
  .fog {
    position: absolute;
    bottom: 0; left: -5%; right: -5%;
    height: 55%;
    pointer-events: none;
    z-index: 10;
    transition: opacity 0.6s;
  }
  .fog-layer {
    position: absolute;
    left: 0; right: 0;
    border-radius: 50%;
  }
  .fog-layer-1 {
    bottom: 0; height: 22%;
    background: radial-gradient(ellipse 100% 100% at 50% 100%,
      hsla(var(--ah),40%,80%,0.18) 0%,
      hsla(var(--ah),30%,70%,0.10) 40%,
      transparent 75%);
    animation: fog-drift-1 14s ease-in-out infinite;
  }
  .fog-layer-2 {
    bottom: 0; height: 32%;
    background: radial-gradient(ellipse 110% 80% at 45% 100%,
      hsla(var(--ah),35%,75%,0.12) 0%,
      hsla(var(--ah),25%,65%,0.07) 50%,
      transparent 80%);
    animation: fog-drift-2 19s ease-in-out infinite;
  }
  .fog-layer-3 {
    bottom: 0; height: 45%;
    background: radial-gradient(ellipse 120% 60% at 55% 100%,
      hsla(var(--ah),30%,70%,0.08) 0%,
      transparent 70%);
    animation: fog-drift-3 25s ease-in-out infinite;
  }

  /* RAMP & ENTRANCE */
  .stage-floor {
    position: absolute;
    bottom: 0; left: 0; right: 0; height: 55%;
    background: linear-gradient(0deg, rgba(8,8,16,0.97) 0%, rgba(10,10,20,0.85) 30%, rgba(10,10,20,0.5) 60%, transparent 100%);
    z-index: 7;
  }
  .gorilla-platform {
    position: absolute;
    left: 27%; top: 52%;
    width: 46%; height: 4%;
    z-index: 9;
    background: linear-gradient(180deg, rgba(28,28,48,0.95) 0%, rgba(18,18,32,0.9) 100%);
    border: 1px solid rgba(255,255,255,0.05);
    border-bottom: none;
    border-radius: 2px 2px 0 0;
  }
  .gorilla {
    position: absolute;
    left: 50%; top: 43%;
    transform: translateX(-50%);
    width: 9%; height: 10%;
    z-index: 11;
    border-radius: 2px 2px 0 0;
    background: linear-gradient(180deg, #080812 0%, #0c0c1a 100%);
    border: 1px solid rgba(255,255,255,0.06);
    border-bottom: none;
    box-shadow: 0 0 20px rgba(0,0,0,0.8), inset 0 0 15px rgba(0,0,0,0.6);
  }
  .gorilla::before {
    content: '';
    position: absolute;
    inset: 3px;
    background: repeating-linear-gradient(
      90deg,
      rgba(20,20,50,0.9) 0px,
      rgba(15,15,35,0.9) 2px,
      rgba(25,25,55,0.6) 3px,
      rgba(20,20,50,0.9) 5px
    );
    border-radius: 2px 2px 0 0;
  }
  .gorilla::after {
    content: '';
    position: absolute;
    top: -2px; left: 10%; right: 10%; height: 3px;
    background: rgba(100,170,255,0.2);
    border-radius: 2px;
    box-shadow: 0 0 8px rgba(100,170,255,0.3);
  }
  .ramp {
    position: absolute;
    bottom: 0; left: 50%; 
    transform: translateX(-50%);
    width: 36%; height: 46%;
    z-index: 7;
    background: linear-gradient(180deg, 
      rgba(12,12,25,0.95) 0%, 
      rgba(16,16,32,0.85) 30%,
      rgba(20,20,40,0.7) 60%,
      rgba(22,22,44,0.5) 100%
    );
    clip-path: polygon(40% 0%, 60% 0%, 78% 100%, 22% 100%);
  }
  .ramp::before {
    content: '';
    position: absolute;
    inset: 0;
    background: 
      repeating-linear-gradient(
        180deg,
        transparent 0px,
        transparent 22px,
        rgba(255,255,255,0.012) 22px,
        rgba(255,255,255,0.012) 23px
      );
    clip-path: polygon(40% 0%, 60% 0%, 78% 100%, 22% 100%);
  }
  .ramp::after {
    content: '';
    position: absolute;
    inset: 0;
    clip-path: polygon(
      40% 0%, 60% 0%, 78% 100%, 22% 100%,
      23% 100%, 40.5% 0%, 59.5% 0%, 77% 100%,
      78% 100%, 60% 0%, 40% 0%, 22% 100%
    );
    background: rgba(100,170,255,0.06);
  }
  .ramp-edge-left, .ramp-edge-right {
    display: none;
  }
  .truss {
    position: absolute;
    width: 4%;
    top: 5%; height: 48%;
    z-index: 7;
    background: linear-gradient(180deg, 
      rgba(30,30,50,0.9) 0%, 
      rgba(20,20,35,0.9) 50%,
      rgba(15,15,25,0.8) 100%
    );
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 2px;
  }
  .truss::before {
    content: '';
    position: absolute;
    top: 0; left: 50%; transform: translateX(-50%);
    width: 6px; height: 6px;
    background: rgba(100,170,255,0.3);
    border-radius: 50%;
    box-shadow: 0 0 6px rgba(100,170,255,0.4);
  }
  .truss::after {
    content: '';
    position: absolute;
    inset: 8px 3px;
    background: repeating-linear-gradient(
      0deg,
      transparent 0px,
      transparent 8px,
      rgba(255,255,255,0.03) 8px,
      rgba(255,255,255,0.03) 9px
    );
  }
  .truss-left { left: 27%; }
  .truss-right { right: 27%; }
  .truss-center { left: 48%; display: none; }
  .stage-apron {
    position: absolute;
    bottom: 0; left: 0; right: 0; height: 4%;
    background: linear-gradient(0deg, rgba(20,20,40,1) 0%, rgba(15,15,30,0.9) 100%);
    border-top: 1px solid rgba(255,255,255,0.06);
    z-index: 8;
  }
  .stage-apron::before {
    content: '';
    position: absolute;
    top: 0; left: 20%; right: 20%; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(100,170,255,0.1), transparent);
  }

  /* SCREEN */
  .screen {
    position: absolute;
    overflow: hidden;
    border-radius: 3px;
    border: 2px solid rgba(255,255,255,0.08);
    box-shadow: inset 0 0 30px rgba(0,0,0,0.8);
    background: #0a0a0f;
    transition: box-shadow 0.4s ease;
  }
  .screen.playing {
    box-shadow: 0 0 30px var(--glow), 0 0 60px rgba(0,100,255,0.1), inset 0 0 20px rgba(0,0,0,0.5);
  }
  .screen.framed {
    border: 4px solid #1a1a2a;
    border-image: linear-gradient(
      180deg,
      rgba(80,85,100,0.8) 0%,
      rgba(45,48,60,0.9) 20%,
      rgba(60,63,75,0.7) 40%,
      rgba(35,38,48,0.9) 60%,
      rgba(55,58,70,0.7) 80%,
      rgba(40,43,55,0.9) 100%
    ) 1;
    box-shadow: 
      inset 0 0 30px rgba(0,0,0,0.8),
      0 2px 8px rgba(0,0,0,0.6),
      0 0 1px rgba(255,255,255,0.1);
  }
  .screen.framed.playing {
    box-shadow: 
      0 0 30px var(--glow), 
      0 0 60px rgba(0,100,255,0.1), 
      inset 0 0 20px rgba(0,0,0,0.5),
      0 2px 8px rgba(0,0,0,0.6),
      0 0 1px rgba(255,255,255,0.1);
  }
  .screen-frame-outer {
    position: absolute;
    overflow: hidden;
    border-radius: 3px;
    padding: 3px;
    background: linear-gradient(
      135deg,
      rgba(70,73,85,0.6) 0%,
      rgba(40,42,52,0.8) 25%,
      rgba(60,63,75,0.5) 50%,
      rgba(35,38,48,0.8) 75%,
      rgba(55,58,68,0.6) 100%
    );
    box-shadow: 0 3px 12px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.06);
  }
  .screen video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .screen-label {
    width: 100%; height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #0a0a1a 0%, #0f0f2a 100%);
    color: var(--text-ghost);
    font-size: 8px;
    text-transform: uppercase;
    letter-spacing: 2px;
  }
  .screen-label.lg { font-size: 11px; }

  /* DROP ZONE */
  .drop-zone {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 15;
    cursor: pointer;
  }
  .drop-zone p { letter-spacing: 3px; text-transform: uppercase; font-weight: 300; }
  .drop-zone .main-text { font-size: 14px; color: rgba(255,255,255,0.3); margin-bottom: 8px; }
  .drop-zone .sub-text { font-size: 11px; color: var(--text-ghost); }

  /* PYRO */
  @keyframes pyro-burst {
    0% { height: 0%; opacity: 1; }
    40% { height: 35%; opacity: 1; }
    100% { height: 40%; opacity: 0; }
  }
  @keyframes pyro-ramp-burst {
    0% { height: 0px; opacity: 1; }
    30% { height: 20px; opacity: 1; }
    100% { height: 28px; opacity: 0; }
  }
  .pyro-col {
    position: absolute;
    bottom: 45%;
    width: 4px;
    height: 0%;
    background: linear-gradient(0deg, #f80, #ff0, #fff);
    z-index: 20;
    border-radius: 2px;
    box-shadow: 0 0 20px #f80, 0 0 40px #f60;
    transform-origin: bottom;
    opacity: 0;
  }
  .pyro-col.fire {
    animation: pyro-burst 0.8s ease-out forwards;
  }
  .pyro-ramp {
    position: absolute;
    width: 3px;
    height: 0px;
    background: linear-gradient(0deg, #f80, #ff0, #fff);
    z-index: 20;
    border-radius: 2px;
    box-shadow: 0 0 12px #f80, 0 0 24px #f60;
    transform-origin: bottom;
    opacity: 0;
  }
  .pyro-ramp.fire {
    animation: pyro-ramp-burst 0.6s ease-out forwards;
  }

  /* CONTROLS */
  .controls {
    padding: 8px 20px;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    align-items: center;
    flex-shrink: 0;
  }

  /* INFO */
  .info {
    padding: 4px 20px 8px;
    font-size: 10px;
    color: rgba(255,255,255,0.2);
    letter-spacing: 1px;
    line-height: 1.4;
    flex-shrink: 0;
  }
  .status { color: rgba(255,200,80,0.5); }
  .status.ok { color: rgba(80,255,120,0.5); }

  /* VERSION TOOLTIP */
  .version-wrap {
    position: relative;
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }
  .version-hint {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 14px; height: 14px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.3);
    font-size: 9px;
    cursor: default;
    font-family: 'Oswald', sans-serif;
    transition: border-color 0.2s, color 0.2s;
  }
  .version-hint:hover { border-color: var(--accent-dim); color: #8cf; }
  .version-tooltip {
    display: none;
    position: absolute;
    top: calc(100% + 8px);
    left: 0;
    background: #0d0d1a;
    border: 1px solid var(--accent-dim);
    border-radius: 4px;
    padding: 8px 12px;
    white-space: nowrap;
    font-size: 10px;
    color: rgba(255,255,255,0.6);
    letter-spacing: 1px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.6);
    z-index: 100;
  }
  .version-tooltip strong { color: #8cf; display: block; margin-bottom: 3px; }
  .version-hint:hover + .version-tooltip,
  .version-tooltip:hover { display: block; }

  /* KEYBOARD HINT */
  .kbd-hint {
    font-size: 10px;
    color: rgba(255,255,255,0.18);
    letter-spacing: 1px;
    align-self: center;
    margin-left: 4px;
  }
  /* SOLO MODE */
  .screen.soloed {
    position: absolute !important;
    left: 0 !important;
    top: 0 !important;
    width: 100% !important;
    height: 100% !important;
    z-index: 30 !important;
    border-radius: 0 !important;
    cursor: zoom-out;
    transition: all 0.25s ease;
  }
  .screen-frame-outer.soloed {
    position: absolute !important;
    left: 0 !important;
    top: 0 !important;
    width: 100% !important;
    height: 100% !important;
    z-index: 30 !important;
    border-radius: 0 !important;
    padding: 0;
    transition: all 0.25s ease;
  }
  .screen:not(.soloed) { cursor: zoom-in; }
  .solo-hint {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.25);
    pointer-events: none;
    z-index: 35;
    font-family: 'Oswald', sans-serif;
  }

  #screensContainer {
    position: absolute;
    inset: 0;
    z-index: 8;

let currentPreset = 0;

let playing = false;
let lightsOn = true;
let fogOn = true;
let audioOn = true;
let vizOn = false;
let connectedVid = null;
const sourcedElements = new WeakSet(); // tracks elements that have had createMediaElementSource called

// --- PRESETS ---
const presetsEl = document.getElementById("presets");
function renderPresets() {
  presetsEl.innerHTML = "";
  let lastCount = null;
  PRESETS.forEach((p, i) => {
    const count = p.screens.length;
    if (lastCount !== null && count !== lastCount) {
      const div = document.createElement("span");
      div.className = "preset-divider";
      presetsEl.appendChild(div);
    }
    lastCount = count;
    const btn = document.createElement("button");
    btn.className = "btn btn-preset" + (i === currentPreset ? " active" : "");
    btn.textContent = p.name;
    btn.onclick = () => {
      if (i === currentPreset) return;
      clearSolo();
      container.classList.add("transitioning");
      setTimeout(() => {
        currentPreset = i;
        renderedPreset = -1;
        renderPresets();
        renderScreens();
        updateInfo();
        container.classList.remove("transitioning");
      }, 180);
    };
    presetsEl.appendChild(btn);
  });
}

// --- SCREENS ---
const container = document.getElementById("screensContainer");

function buildScreenDOM() {
  container.innerHTML = "";
  const preset = PRESETS[currentPreset];
  preset.screens.forEach((s) => {
    let wrapper = null;
    if (s.frame) {
      wrapper = document.createElement("div");
      wrapper.className = "screen-frame-outer";
      wrapper.style.cssText = `
        left: ${s.x - s.w/2 - 0.4}%;
        top: ${s.y - s.h/2 - 0.6}%;
        width: ${s.w + 0.8}%;
        height: ${s.h + 1.2}%;
        z-index: ${s.z || (s.id === "main" ? 3 : 2)};
      `;
    }

    const div = document.createElement("div");
    div.className = "screen" + (s.frame ? " framed" : "");
    div.dataset.screenId = s.id;

    if (s.frame) {
      div.style.cssText = `position: relative; width: 100%; height: 100%; border-radius: 2px;`;
    } else {
      div.style.cssText = `
        left: ${s.x - s.w/2}%;
        top: ${s.y - s.h/2}%;
        width: ${s.w}%;
        height: ${s.h}%;
        z-index: ${s.z || (s.id === "main" ? 3 : 2)};
      `;
    }

    // Video element — always in DOM, hidden until src is set
    const vid = document.createElement("video");
    vid.loop = true;
    vid.playsInline = true;
    vid.muted = !(s.id === "main" && audioOn);
    vid.dataset.screenId = s.id;
    vid.dataset.delay = s.delay || 0;
    vid.style.cssText = "width:100%;height:100%;object-fit:cover;display:none;";
    div.appendChild(vid);

    // Placeholder label — shown when no video is loaded
    const label = document.createElement("div");
    label.className = "screen-label" + (s.w > 20 ? " lg" : "");
    label.textContent = s.label || "SCREEN";
    label.dataset.placeholder = "true";
    div.appendChild(label);

    if (wrapper) {
      wrapper.appendChild(div);
      container.appendChild(wrapper);
      wrapper.addEventListener("click", () => toggleSolo(wrapper));
    } else {
      container.appendChild(div);
      div.addEventListener("click", () => toggleSolo(div));
    }
  });

  renderedPreset = currentPreset;
}

// Called when a new video is loaded — updates src on existing elements, no DOM rebuild
function attachVideos() {
  if (renderedPreset !== currentPreset) buildScreenDOM();
  const preset = PRESETS[currentPreset];

  container.querySelectorAll("[data-placeholder]").forEach(l => l.style.display = "none");

  container.querySelectorAll("video").forEach((vid) => {
    const s = preset.screens.find(sc => sc.id === vid.dataset.screenId);
    if (!s) return;
    vid.style.display = "block";
    if (vid.getAttribute("src") !== videoURL) {
      vid.src = videoURL;
    }
    const delay = parseFloat(vid.dataset.delay) || 0;
    if (delay) {
      const applyDelay = () => { vid.currentTime = delay; };
      // If already buffered (e.g. same URL reloaded), canplay won't fire — set immediately
      if (vid.readyState >= 2) {
        applyDelay();
      } else {
        vid.addEventListener("canplay", applyDelay, { once: true });
      }
    }
  });

  syncPlayback();
  startDriftCorrection();
}

// Called for play/pause — operates on existing video elements, never touches DOM
function syncPlayback() {
  const preset = PRESETS[currentPreset];
  container.querySelectorAll(".screen").forEach(div => {
    div.classList.toggle("playing", playing && !!videoURL);
  });
  container.querySelectorAll("video").forEach((vid) => {
    const s = preset.screens.find(sc => sc.id === vid.dataset.screenId);
    if (!s) return;
    vid.muted = !(s.id === "main" && audioOn);
    if (playing && videoURL && vid.src) {
      vid.play().catch(() => {});
    } else {
      vid.pause();
    }
  });
  if (vizOn && videoURL) setTimeout(connectAudio, 200);
}

// --- SOLO MODE ---
let soloedEl = null;

function toggleSolo(el) {
  const hint = document.getElementById("soloHint");
  if (soloedEl === el) {
    // Exit solo
    el.classList.remove("soloed");
    soloedEl = null;
    hint.style.display = "none";
    // Restore cursor on all screens
    container.querySelectorAll(".screen, .screen-frame-outer").forEach(s => {
      s.style.cursor = "";
    });
  } else {
    // Exit previous solo if any
    if (soloedEl) soloedEl.classList.remove("soloed");
    el.classList.add("soloed");
    soloedEl = el;
    hint.style.display = "block";
  }
}

// Clear solo on preset change
function clearSolo() {
  if (soloedEl) {
    soloedEl.classList.remove("soloed");
    soloedEl = null;
  }
  const hint = document.getElementById("soloHint");
  if (hint) hint.style.display = "none";
}

// --- DRIFT CORRECTION ---
// Looped videos across multiple elements drift over time.
// Every 2s while playing, check each screen's currentTime against where it
// should be relative to main (mainTime + delay, mod duration) and nudge if off by >0.3s.
let driftTimer = null;

function startDriftCorrection() {
  stopDriftCorrection();
  driftTimer = setInterval(correctDrift, 2000);
}

function stopDriftCorrection() {
  clearInterval(driftTimer);
  driftTimer = null;
}

function correctDrift() {
  if (!playing || !videoURL) return;
  const mainVid = container.querySelector("video[data-screen-id='main']");
  if (!mainVid || mainVid.paused || !mainVid.duration) return;

  const mainTime = mainVid.currentTime;
  const duration = mainVid.duration;
  const mainDelay = parseFloat(mainVid.dataset.delay) || 0;

  container.querySelectorAll("video").forEach((vid) => {
    if (vid === mainVid) return;
    const delay = parseFloat(vid.dataset.delay) || 0;
    // Offset relative to main's own delay, not absolute
    const relativeDelay = delay - mainDelay;
    const expected = ((mainTime + relativeDelay) % duration + duration) % duration;
    const actual = vid.currentTime;
    let diff = Math.abs(actual - expected);
    if (diff > duration / 2) diff = duration - diff;
    if (diff > 0.3) {
      vid.currentTime = expected;
    }
  });
}


function renderScreens() {
  if (renderedPreset !== currentPreset) buildScreenDOM();
  if (videoURL) attachVideos();
  // Show center truss only for Diamond and Cascade
  const name = PRESETS[currentPreset].name;
  document.getElementById("trussCenterEl").style.display =
    (name === "Diamond" || name === "Cascade") ? "block" : "none";
  updateInfo();
}

// --- FILE INPUT ---
const fileInput = document.getElementById("fileInput");
const loadBtn = document.getElementById("loadBtn");
const statusText = document.getElementById("statusText");
const dropZone = document.getElementById("dropZone");
const stageWrap = document.getElementById("stageWrap");

function loadVideo(file) {
  if (!file) return;
  setStatus(`Loading: ${file.name}...`, false);
  if (videoURL) URL.revokeObjectURL(videoURL);
  videoURL = URL.createObjectURL(file);
  playing = true;
  loadBtn.textContent = "Change Video";
  dropZone.style.display = "none";
  setStatus(`Playing: ${file.name}`, true);
  attachVideos(); // update src on existing elements, no DOM rebuild
  updatePlayBtn();
}

fileInput.addEventListener("change", (e) => {
  loadVideo(e.target.files[0]);
  fileInput.value = "";
});

dropZone.addEventListener("click", () => fileInput.click());

stageWrap.addEventListener("dragover", (e) => {
  e.preventDefault();
  stageWrap.classList.add("drag-over");
});
stageWrap.addEventListener("dragleave", () => stageWrap.classList.remove("drag-over"));
stageWrap.addEventListener("drop", (e) => {
  e.preventDefault();
  stageWrap.classList.remove("drag-over");
  const file = e.dataTransfer?.files?.[0];
  if (file) loadVideo(file);
});

// --- PLAY/PAUSE ---
function togglePlay() {
  if (!videoURL) return;
  playing = !playing;
  syncPlayback();
  if (playing) startDriftCorrection(); else stopDriftCorrection();
  updatePlayBtn();
  setStatus(playing ? "Playing" : "Paused", !!videoURL);
}

function updatePlayBtn() {
  const btn = document.getElementById("playBtn");
  if (!videoURL) {
    btn.disabled = true;
    btn.className = "btn btn-play";
    btn.textContent = "No Video Loaded";
  } else {
    btn.disabled = false;
    btn.className = "btn btn-play" + (playing ? " active" : "");
    btn.textContent = playing ? "Pause" : "Play Entrance";
  }
}

// --- PYRO ---
let pyroStageTimer = null;
let pyroRampTimer = null;

function firePyro() {
  const cols = document.querySelectorAll(".pyro-col");
  clearTimeout(pyroStageTimer);
  cols.forEach((col, i) => {
    col.classList.remove("fire");
    col.style.animationDelay = `${i * 0.1}s`;
    void col.offsetWidth;
    col.classList.add("fire");
  });
  pyroStageTimer = setTimeout(() => cols.forEach(c => c.classList.remove("fire")), 2500);
}

function firePyroRamp() {
  const ramps = document.querySelectorAll(".pyro-ramp");
  clearTimeout(pyroRampTimer);
  ramps.forEach((r, i) => {
    r.classList.remove("fire");
    const pairIndex = i % 5;
    r.style.animationDelay = `${pairIndex * 0.15}s`;
    void r.offsetWidth;
    r.classList.add("fire");
  });
  pyroRampTimer = setTimeout(() => ramps.forEach(r => r.classList.remove("fire")), 2500);
}

// --- ARENA COLOR ---
function hexToHsl(hex) {
  let r = parseInt(hex.slice(1,3),16)/255;
  let g = parseInt(hex.slice(3,5),16)/255;
  let b = parseInt(hex.slice(5,7),16)/255;
  const max = Math.max(r,g,b), min = Math.min(r,g,b);
  let h, s, l = (max+min)/2;
  if (max === min) { h = s = 0; }
  else {
    const d = max - min;
    s = l > 0.5 ? d/(2-max-min) : d/(max+min);
    switch(max) {
      case r: h = ((g-b)/d + (g<b?6:0))/6; break;
      case g: h = ((b-r)/d + 2)/6; break;
      case b: h = ((r-g)/d + 4)/6; break;
    }
  }
  return [Math.round(h*360), Math.round(s*100), Math.round(l*100)];
}

function applyArenaColor(hex) {
  const [h, s, l] = hexToHsl(hex);
  const root = document.documentElement;
  root.style.setProperty('--ah', h);
  root.style.setProperty('--as', s + '%');
  root.style.setProperty('--al', Math.max(l, 55) + '%');
  // Also update accent vars for buttons/borders
  root.style.setProperty('--accent', `hsl(${h},${s}%,${Math.max(l,55)}%)`);
  root.style.setProperty('--accent-dim', `hsla(${h},${s}%,${Math.max(l,45)}%,0.3)`);
  root.style.setProperty('--glow', `hsla(${h},${s}%,40%,0.3)`);
}

document.getElementById("arenaColor").addEventListener("input", e => applyArenaColor(e.target.value));

// --- LIGHTS ---
function toggleLights() {
  lightsOn = !lightsOn;
  const bg = document.getElementById("arenaBg");
  bg.className = "arena-bg " + (lightsOn ? "lights-on" : "lights-off");
  const opacity = lightsOn ? "1" : "0";
  ["spotL","spotR","spotC","spotWL","spotWR","floorBounce"].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.opacity = opacity;
  });
  const btn = document.getElementById("lightsBtn");
  btn.className = "btn btn-toggle" + (lightsOn ? " on" : "");
  btn.textContent = lightsOn ? "Lights On" : "Lights Off";
}

// --- FOG ---
function toggleFog() {
  fogOn = !fogOn;
  document.getElementById("fogLayer").style.opacity = fogOn ? "1" : "0";
  const btn = document.getElementById("fogBtn");
  btn.className = "btn btn-toggle" + (fogOn ? " on-fog" : "");
  btn.textContent = fogOn ? "Fog On" : "Fog Off";
}

// --- AUDIO ---
function toggleMute() {
  audioOn = !audioOn;
  const btn = document.getElementById("muteBtn");
  if (audioOn) {
    btn.style.background = "rgba(80,200,120,0.1)";
    btn.style.borderColor = "rgba(80,200,120,0.3)";
    btn.style.color = "#8f8";
    btn.textContent = "Audio On";
  } else {
    btn.style.background = "rgba(255,255,255,0.04)";
    btn.style.borderColor = "rgba(255,255,255,0.1)";
    btn.style.color = "rgba(255,255,255,0.3)";
    btn.textContent = "Audio Off";
  }
  // Use data attribute — no index assumption
  container.querySelectorAll("video").forEach((vid) => {
    vid.muted = !(vid.dataset.screenId === "main" && audioOn);
  });
}

// --- STATUS ---
function setStatus(text, ok) {
  statusText.textContent = text;
  statusText.className = "status" + (ok ? " ok" : "");
}

function updateInfo() {
  const p = PRESETS[currentPreset];
  document.getElementById("stageInfo").textContent = `Stage: ${p.name} / ${p.screens.length} screens`;
}

// --- FULLSCREEN ---
function toggleFullscreen() {
  const el = document.getElementById("stageWrap");
  const btn = document.getElementById("fsBtn");
  if (!document.fullscreenElement) {
    el.requestFullscreen().catch(() => {});
  } else {
    document.exitFullscreen();
  }
}

document.addEventListener("fullscreenchange", () => {
  const btn = document.getElementById("fsBtn");
  if (document.fullscreenElement) {
    btn.textContent = "✕ Exit";
    btn.style.opacity = "0";
    // fade out after a moment so it's not always in the way
    setTimeout(() => { btn.style.transition = "opacity 1s"; btn.style.opacity = "0.15"; }, 1500);
  } else {
    btn.style.transition = "opacity 0.2s";
    btn.style.opacity = "1";
    btn.textContent = "⛶ Fullscreen";
  }
});

// Show fullscreen button on mouse move inside stage when fullscreen
document.getElementById("stageWrap").addEventListener("mousemove", () => {
  if (!document.fullscreenElement) return;
  const btn = document.getElementById("fsBtn");
  btn.style.transition = "opacity 0.2s";
  btn.style.opacity = "1";
  clearTimeout(btn._hideTimer);
  btn._hideTimer = setTimeout(() => {
    btn.style.transition = "opacity 1s";
    btn.style.opacity = "0.15";
  }, 2000);
});

// --- KEYBOARD SHORTCUTS ---
document.addEventListener("keydown", (e) => {
  if (e.target !== document.body) return;
  switch (e.code) {
    case "Space": e.preventDefault(); togglePlay(); break;
    case "KeyP":  firePyro(); break;
    case "KeyR":  firePyroRamp(); break;
    case "KeyF":  toggleFullscreen(); break;
  }
});

// --- INIT ---
renderPresets();
renderScreens();
updateInfo();
updatePlayBtn();

// --- VISUALIZER ---
let audioCtx = null;
let analyser = null;
let vizAnimId = null;
const vizCanvas = document.getElementById("vizCanvas");
const vizCtx = vizCanvas.getContext("2d");

function toggleVisualizer() {
  vizOn = !vizOn;
  const btn = document.getElementById("vizBtn");
  if (vizOn) {
    btn.className = "btn btn-toggle on";
    btn.style.background = "rgba(200,80,255,0.15)";
    btn.style.borderColor = "rgba(200,80,255,0.4)";
    btn.style.color = "#c8f";
    btn.textContent = "Visualizer On";
    vizCanvas.classList.add("active"); // was missing — canvas was always opacity:0
    startVisualizer();
  } else {
    btn.className = "btn btn-toggle";
    btn.style.background = "";
    btn.style.borderColor = "";
    btn.style.color = "";
    btn.textContent = "Visualizer Off";
    vizCanvas.classList.remove("active");
    stopVisualizer();
  }
}

function connectAudio() {
  const mainVid = container.querySelector("video[data-screen-id='main']") || container.querySelector("video");
  if (!mainVid) return;

  if (sourcedElements.has(mainVid)) {
    connectedVid = mainVid;
    // Resume in case browser suspended the context
    if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();
    return;
  }

  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    analyser.smoothingTimeConstant = 0.8;
    analyser.connect(audioCtx.destination);
  }

  // Resume suspended context (browsers auto-suspend without user gesture)
  if (audioCtx.state === "suspended") audioCtx.resume();

  try {
    const source = audioCtx.createMediaElementSource(mainVid);
    source.connect(analyser);
    sourcedElements.add(mainVid);
    connectedVid = mainVid;
  } catch(e) {
    console.warn("Audio connect failed:", e);
  }
}

function startVisualizer() {
  connectAudio();
  drawViz();
}

function stopVisualizer() {
  if (vizAnimId) cancelAnimationFrame(vizAnimId);
  vizAnimId = null;
  vizCtx.clearRect(0, 0, vizCanvas.width, vizCanvas.height);
}

function drawViz() {
  if (!vizOn) return;
  vizAnimId = requestAnimationFrame(drawViz);

  const rect = vizCanvas.getBoundingClientRect();
  if (vizCanvas.width !== rect.width || vizCanvas.height !== rect.height) {
    vizCanvas.width = rect.width;
    vizCanvas.height = rect.height;
  }

  const W = vizCanvas.width;
  const H = vizCanvas.height;
  vizCtx.clearRect(0, 0, W, H);

  if (!analyser) { connectAudio(); return; }

  const bufLen = analyser.frequencyBinCount;
  const dataArray = new Uint8Array(bufLen);
  analyser.getByteFrequencyData(dataArray);

  let avg = 0;
  for (let i = 0; i < bufLen; i++) avg += dataArray[i];
  avg /= bufLen;
  const energy = avg / 255;

  const cx = W * 0.5;
  const cy = H * 0.5;

  const barCount = 80;
  const innerR = Math.min(W, H) * 0.05;
  const maxR = Math.max(W * 0.48, H * 0.48);
  const usableBins = Math.floor(bufLen * 0.7);
  const halfBars = barCount / 2;

  for (let i = 0; i < barCount; i++) {
    const angle = (i / barCount) * Math.PI * 2 - Math.PI / 2;
    const mirrorIdx = i < halfBars ? i : barCount - i;
    const freqIdx = Math.floor((mirrorIdx / halfBars) * usableBins);
    const val = (dataArray[freqIdx] / 255) * 0.7;

    const barLen = val * (maxR - innerR);
    const x1 = cx + Math.cos(angle) * innerR;
    const y1 = cy + Math.sin(angle) * innerR;
    const x2 = cx + Math.cos(angle) * (innerR + barLen);
    const y2 = cy + Math.sin(angle) * (innerR + barLen);

    const hue = 260 + (i / barCount) * 120;
    vizCtx.strokeStyle = `hsla(${hue}, 80%, 60%, ${0.2 + val * 0.35})`;
    vizCtx.lineWidth = Math.max(2, (W / barCount) * 0.6);
    vizCtx.beginPath();
    vizCtx.moveTo(x1, y1);
    vizCtx.lineTo(x2, y2);
    vizCtx.stroke();
  }

  const glowR = innerR + energy * maxR * 0.3;
  const grd = vizCtx.createRadialGradient(cx, cy, 0, cx, cy, glowR);
  grd.addColorStop(0, `rgba(180, 100, 255, ${energy * 0.15})`);
  grd.addColorStop(0.5, `rgba(100, 150, 255, ${energy * 0.06})`);
  grd.addColorStop(1, "rgba(0, 0, 0, 0)");
  vizCtx.fillStyle = grd;
  vizCtx.fillRect(0, 0, W, H);

  const waveData = new Uint8Array(bufLen);
  analyser.getByteTimeDomainData(waveData);
  const waveR = innerR * 1.5 + energy * 20;

  vizCtx.strokeStyle = `rgba(150, 200, 255, ${0.1 + energy * 0.2})`;
  vizCtx.lineWidth = 1.5;
  vizCtx.beginPath();
  for (let i = 0; i < bufLen; i++) {
    const angle = (i / bufLen) * Math.PI * 2;
    const waveVal = (waveData[i] - 128) / 128;
    const r = waveR + waveVal * 30;
    const x = cx + Math.cos(angle) * r;
    const y = cy + Math.sin(angle) * r;
    if (i === 0) vizCtx.moveTo(x, y); else vizCtx.lineTo(x, y);
  }
  vizCtx.closePath();
  vizCtx.stroke();
}
